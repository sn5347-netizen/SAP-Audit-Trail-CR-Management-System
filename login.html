<!DOCTYPE html>
<html>

<head>

    <title>SAP Change Management Portal</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .login-container{

            background:white;
            width:400px;

            padding:40px;

            border-radius:12px;

            box-shadow:0px 4px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0a6ed1;
            margin-bottom:30px;
        }

        input{

            width:100%;
            padding:12px;

            margin-bottom:20px;

            border:1px solid #ccc;
            border-radius:6px;

            box-sizing:border-box;
        }

        button{

            width:100%;
            padding:12px;

            background:#0a6ed1;
            color:white;

            border:none;

            border-radius:6px;

            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0854a0;
        }

    </style>

</head>

<body>

<div class="login-container">

    <h1>SAP Change Management Portal</h1>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">

        Login

    </button>

</div>

<script>

async function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(!username || !password){

        alert("Please enter username and password");
        return;
    }

    try{

        const response = await fetch(
            "http://localhost:3000/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({
                    username,
                    password
                })
            }
        );

        const data = await response.json();

        if(data.success){
            localStorage.setItem("role", data.role);
            if(data.role === "Requester"){
                window.location.href = "requester.html";
            }

            else if(data.role === "AMS"){
                window.location.href = "ams.html";
            }

            else if(data.role === "Manager"){
                window.location.href = "manager.html";
            }

            else if(data.role === "CAB"){
                window.location.href = "cab.html";
            }

            else if(data.role === "Testing"){
                window.location.href = "testing.html";
            }

            else if(data.role === "Production"){
                window.location.href = "production.html";
            }

            else if(data.role === "Admin"){
                window.location.href = "index.html";
            }
        }
        else{
            alert("Invalid Credentials");
        }
    }

    catch(error){

        alert("Server Connection Error");
        console.log(error);
    }

}

</script>

</body>

</html>
