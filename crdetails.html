<!DOCTYPE html>
<html>

<head>

<title>CR Details</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;
}

h1{
    color:#0a6ed1;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.timeline-step{

    display:flex;

    align-items:center;

    gap:18px;

    padding:18px;

    margin:0;

    position:relative;

    border-left:none;

    background:white;

    border-radius:10px;

}

.timeline-step:not(:last-child)::after{

    content:"";

    position:absolute;

    left:11px;

    top:28px;

    width:3px;

    height:38px;

    background:#d6d6d6;

}
.timeline-step:hover{

    transform:translateX(6px);

    box-shadow:0 6px 15px rgba(0,0,0,.08);

}

.step-icon{

    width:22px;

    height:22px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:13px;

    font-weight:bold;

}

.completed .step-icon{

    background:#198754;

    color:white;

}

.current .step-icon{

    background:#fd7e14;

    color:white;

}

.pending .step-icon{

    background:#dee2e6;

    color:#777;

}
.current{

    background:white;

}
.current .step-icon{

    background:#ffc107;

    color:white;

}
.ai-box{
    background:#e8f4ff;
    border-left:5px solid #0a6ed1;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
}
.ai-progress-wrapper{

    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;

}

.ai-progress{

    flex:1;

    height:16px;

    background:#e9ecef;

    border-radius:20px;

    overflow:hidden;

}

.ai-progress-bar{

    height:100%;

    border-radius:20px;

    transition:width .8s ease;

}

.progress-text{

    font-weight:bold;

    min-width:45px;

    text-align:right;

}

</style>

</head>

<body>
    <button
    onclick="window.location.href='index.html'"
    style="
    background:#0a6ed1;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    margin-bottom:20px;
    cursor:pointer;
    ">
    🏠 Back to Dashboard
    </button>
    </button>

<button
onclick="window.location.href='login.html'"
style="
background:#dc3545;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
margin-left:10px;
cursor:pointer;
">
🚪 Logout
</button>

<h1>Change Request Details</h1>

<div id="details"></div>

<script>
    /*const role = localStorage.getItem("role");

    if(
        role !== "AMS" &&
        role !== "Manager" &&
        role !== "CAB"
    ){
        alert("Access Denied");
        window.location.href = "login.html";
    }*/

async function loadCRDetails(){

    const params =
    new URLSearchParams(window.location.search);

    const crId =
    params.get("id");

    console.log("CR ID:", crId);

    const response =
    await fetch("http://localhost:3000");

    const data =
    await response.json();

    console.log("CR ID:", crId);
    console.log("All CRs:", data.crs);

    const cr =
    data.crs.find(x => x.cr_id === crId);
    
    console.log("Found CR:", cr);

    if(!cr){
        document.getElementById("details").innerHTML =
        "<h2>CR Not Found</h2>";
        return;
    }

    document.getElementById("details").innerHTML = `
    
    <div class="card">

        <h2>${cr.cr_id}</h2>

        <h3>${cr.title}</h3>

        <p><strong>Module:</strong> ${cr.module}</p>

        <p><strong>Status:</strong> ${cr.status}</p>

        <p><strong>Priority:</strong> ${cr.priority}</p>

        <p><strong>Risk:</strong> ${cr.risk}</p>

        <div class="ai-box">

            <h3>🤖 AI Recommendation</h3>

            <p><strong>${cr.aiRecommendation || "Recommended"}</strong></p>

            <p>
            ${
                cr.aiRecommendation === "CAB Review Required"
                ? "High risk or critical change. CAB review is recommended."

                : cr.aiRecommendation === "Auto Recommended"
                ? "Low risk change. Can proceed with standard approval."

                : "Change request appears safe for normal processing."
            }
            </p>

        </div>
    </div>
    <div class="ai-box">

<h3>🤖 AI Risk Assessment</h3>

<p>
<strong>AI Risk Score:</strong>

${
    cr.risk === "High"
    ? "92%"

    : cr.risk === "Medium"
    ? "63%"

    : "18%"
}
</p>

<div class="ai-progress-wrapper">

    <div class="ai-progress">

        <div
        class="ai-progress-bar"
        style="
        width:${
            cr.risk === "High"
            ? 92
            : cr.risk === "Medium"
            ? 63
            : 18
        }%;
        background:${
            cr.risk === "High"
            ? "#dc3545"
            : cr.risk === "Medium"
            ? "#ffc107"
            : "#198754"
        };
        ">
        </div>

    </div>

</div>

<p>
<strong>Duplicate Detection:</strong>

${
    cr.duplicateDetected === "Yes"
    ? "⚠ Similar Change Request Detected"
    : "✅ No Duplicate Found"
}

</p>

<p>
<strong>Duplicate Probability:</strong>

${cr.duplicateProbability}%

</p>

${
cr.duplicateDetected === "Yes"
?

`<p>

<strong>Similar CR:</strong>

${cr.similarCR}

</p>`

:

""
}

<p>

<strong>Deployment Success:</strong>

${
    cr.risk === "High"
    ? "74%"

    : cr.risk === "Medium"
    ? "88%"

    : "98%"
}

</p>

<p>

<strong>Recommended Action:</strong>

${
    cr.duplicateDetected === "Yes"

    ? "Review Similar Change Request"

    : cr.risk === "High"

    ? "CAB Review Required"

    : cr.priority === "Critical"

    ? "Fast Track Approval"

    : "Proceed Normally"
}
</p>

</div>
    <div class="card">

<h2>Workflow Progress</h2>

<div class="timeline-step completed">
    <div class="step-icon">✓</div>
    <div>Request Created</div>
</div>

<div class="timeline-step ${
cr.status !== "Pending"
? "completed"
: "pending"
}">
    <div class="step-icon">
        ${cr.status !== "Pending" ? "✓" : ""}
    </div>
    <div>AMS Analysis</div>
</div>

<div class="timeline-step ${
cr.managerApproval === "Approved"
? "completed"
: cr.status === "Manager Approval Pending"
? "current"
: "pending"
}">
    <div class="step-icon">
        ${
            cr.managerApproval === "Approved"
            ? "✓"
            : cr.status === "Manager Approval Pending"
            ? ""
            : ""
        }
    </div>
    <div>Manager Approval</div>
</div>

<div class="timeline-step ${
cr.cabApproval === "Approved"
? "completed"
: cr.status === "CAB Approval Pending"
? "current"
: "pending"
}">
    <div class="step-icon">
        ${
            cr.cabApproval === "Approved"
            ? "✓"
            : ""
        }
    </div>
    <div>CAB Approval</div>
</div>

<div class="timeline-step ${
cr.testingStatus === "Passed"
? "completed"
: cr.status === "Testing Pending"
? "current"
: "pending"
}">
    <div class="step-icon">
        ${
            cr.testingStatus === "Passed"
            ? "✓"
            : ""
        }
    </div>
    <div>Testing</div>
</div>

<div class="timeline-step ${
cr.deploymentStatus === "Released"
? "completed"
: cr.status === "Production Pending"
? "current"
: "pending"
}">
    <div class="step-icon">
        ${
            cr.deploymentStatus === "Released"
            ? "✓"
            : ""
        }
    </div>
    <div>Production Release</div>
</div>

</div>

    `;

}

loadCRDetails();

</script>

</body>

</html>
