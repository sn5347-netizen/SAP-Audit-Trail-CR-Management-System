<!DOCTYPE html>
<html>

<head>
    <title>SAP CR Tracker</title>
    
    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
        }
        h1{
            color:#0a6ed1;
            margin-bottom:30px;
        }
        button{
            background:#0a6ed1;
            color:white;
            border:none;
            padding:12px 24px;
            border-radius:8px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#0854a0;
        }

        .card{
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
        }
        .dashboard{
            display:flex;
            gap:20px;
            margin-bottom:30px;
            flex-wrap:wrap;
        }

        .metric{
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.12);
        width: 220px;
        text-align: center;
        transition: 0.3s;
        }

        .metric:hover{
        transform: translateY(-5px);
        }

        .metric h3{
        font-size: 32px;
        margin: 0;
        color: #0070f2;
        }

        .metric p{
        margin-top: 10px;
        color: #666;
        }

        .high{
        color: red;
        font-weight: bold;
        }

        .medium{
        color: orange;
        font-weight: bold;
        }

        .low{
        color: green;
        font-weight: bold;
        }
        .audit-section{
        background:white;
        margin-top:25px;
        padding:25px;
        border-radius:12px;
        box-shadow:0px 4px 12px rgba(0,0,0,0.12);
        }

        .audit-section h2{
        color:#0a6ed1;
        margin-bottom:20px;
        }

        .audit-item{
        background:white;
        padding:18px;
        margin:12px 0;
        border-radius:10px;
        box-shadow:0px 2px 8px rgba(0,0,0,0.08);
        border-left:none;
        }
        .audit-item h4{
        margin-bottom:10px;
        color:#0a6ed1;
        }
        .audit-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
        gap:15px;
        }
        .badge {
        padding: 6px 12px;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        font-size: 13px;
        }

        .approved {
        background: #28a745;
        }

        .pending {
        background: #ffc107;
        color: black;
        }

        .progress {
        background: #0a6ed1;
        }

        .released {
        background: #198754;
        }
        .timeline{
        margin-top:20px;
        padding-top:15px;
        border-top:1px solid #ddd;
        }

        .ai-box{
        background:#e8f4ff;
        border-left:5px solid #0a6ed1;
        padding:15px;
        margin-top:20px;
        border-radius:8px;
        }

        .timeline-step{
        margin:8px 0;
        font-weight:600;
        }

        .completed{
        color:#28a745;
        }

        .inprogress{
        color:#0a6ed1;
        }

        .notstarted{
        color:#999;
        }
        .ai-summary-card{
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0px 4px 12px rgba(0,0,0,0.12);
        width:220px;
        }
        .chart-container{

    margin-top:35px;

}

.chart-card{

    background:white;

    padding:25px;

    border-radius:12px;

    box-shadow:0 4px 10px rgba(0,0,0,.1);

}

.chart-card h2{

    margin-bottom:20px;

    color:#0a6ed1;

}

#statusChart{

    max-width:420px;
    max-height:320px;
    margin:auto;
    display:block;

}
            

    </style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

    <div>

        <button
        id="backButton"
        style="
        background:#0a6ed1;
        color:white;
        border:none;
        padding:10px 18px;
        border-radius:8px;
        cursor:pointer;
        margin-right:10px;
        display:none;
        ">
        ⬅ Back
        </button>

        <h1 style="display:inline-block;margin-left:10px;">
        SAP Audit Trail & Change Intelligence Dashboard
        </h1>

    </div>

    <button
    onclick="logout()"
    style="
    background:#dc3545;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    ">
    🚪 Logout
    </button>

</div>

    <div id="dashboard"></div>
    <div id="duplicatePanel"></div>
    <div style="margin:20px 0;">

    <button
    onclick="window.location.href='crlist.html'"
    style="
    background:#0a6ed1;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    margin-right:10px;
    cursor:pointer;
    ">
    View All CRs
    </button>

    <button
    onclick="window.location.href='audit.html'"
    style="
    background:#198754;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    ">
    View Full Audit Trail
    </button>

</div>
    <div class="chart-container">

        <div class="chart-card">

            <h2>Status Distribution</h2>

            <canvas id="statusChart"></canvas>

        </div>

    </div>
    <div id="auditTrail"></div>
     
    <p id="result"></p>

    <script>
        const from = localStorage.getItem("dashboardFrom");

const backButton = document.getElementById("backButton");

if(from){

    backButton.style.display = "inline-block";

    backButton.onclick = function(){

        if(from === "ams"){

            window.location.href = "ams.html";

        }

        else if(from === "manager"){

            window.location.href = "manager.html";

        }

        else if(from === "cab"){

            window.location.href = "cab.html";

        }

    };

}

    async function loadCRData() {
        console.log("Load CR Data clicked");
        const response = await fetch("http://localhost:3000");
        const data = await response.json();
        console.log(data);
        const crs = data.crs;
        const highRisk =
        crs.filter(cr => cr.risk === "High").length;

        const critical =
        crs.filter(cr => cr.priority === "Critical").length;

        const recommendations =
        crs.filter(cr => cr.aiRecommendation != null).length;

        const duplicateCRs =
        crs.filter(cr => cr.duplicateDetected === "Yes");

        const auditLogs = data.auditLogs;
        const totalCRs = crs.length;
        const rejectedCRs =
            crs.filter(cr =>
                cr.status === "Rejected" ||
                cr.status === "Rejected By CAB"
            ).length;

        const criticalCRs =
            crs.filter(cr => cr.priority === "Critical").length;

        const completedCRs =
            crs.filter(cr => cr.status === "Completed").length;

        const inProgressCRs =
            crs.filter(cr =>
                [
                    "Pending",
                    "Analysis Completed",
                    "Manager Approval Pending",
                    "CAB Approval Pending",
                    "Testing Pending",
                    "Production Pending"
                ].includes(cr.status)
            ).length;
        document.getElementById("dashboard").innerHTML = `
            <div class="dashboard">

                <div class="metric"
                onclick="window.location.href='crlist.html'"
                style="cursor:pointer;">
                    <h3>${totalCRs}</h3>
                    <p>Total CRs</p>
                </div>

                <div class="metric"
                onclick="window.location.href='crlist.html?filter=rejected'"
                style="cursor:pointer;">
                    <h3>${rejectedCRs}</h3>
                    <p>Rejected CRs</p>
                </div>

                <div class="metric"
                onclick="window.location.href='crlist.html?filter=completed'"
                style="cursor:pointer;">
                    <h3>${completedCRs}</h3>
                    <p>Completed</p>
                </div>

                <div class="metric"
                onclick="window.location.href='crlist.html?filter=inprogress'"
                style="cursor:pointer;">
                    <h3>${inProgressCRs}</h3>
                    <p>In Progress</p>
                </div>

                <div class="ai-summary-card">

    <h2>🤖 AI Insights</h2>

    <p id="highRiskCount"></p>

    <p id="criticalCount"></p>

    <p id="recommendationCount"></p>

    <p id="duplicateCount"></p>

</div>

            </div>
        `;
        document.getElementById("highRiskCount").innerHTML =
        `⚠️ High Risk CRs : ${highRisk}`;

        document.getElementById("criticalCount").innerHTML =
        `🔥 Critical CRs : ${critical}`;

        document.getElementById("recommendationCount").innerHTML =
        `🤖 AI Recommendations : ${recommendations}`;

        document.getElementById("duplicateCount").innerHTML =
        `⚠️ <span
        id="duplicateToggle"
        style="cursor:pointer;color:#0a6ed1;font-weight:bold;text-decoration:underline;"
        onclick="toggleDuplicatePanel()">
        ▶ Duplicate Change Requests : ${duplicateCRs.length}
        </span>`;

        let auditOutput = `
          <div class="audit-section">
            <h2>Recent Audit Activity</h2>
        `;

        auditOutput += `
        <div class="audit-grid">
        `;

        auditLogs.slice(0,10).forEach(log => {
            auditOutput += `
            <div class="audit-item">

                <h4>${log.cr_id}</h4>

                <p><strong>User:</strong> ${log.user_name}</p>

                <p><strong>Role:</strong> ${log.role}</p>

                <p><strong>Action:</strong> ${log.action_taken}</p>

                <p><strong>Date & Time:</strong> ${new Date(log.log_time).toLocaleString("en-IN",{
                    day:"2-digit",
                    month:"short",
                    year:"numeric",
                    hour:"2-digit",
                    minute:"2-digit",
                    hour12:true
                })}</p>

            </div>
            `;

        });

    auditOutput += `
    </div>
    </div>
    `;

        document.getElementById("auditTrail").innerHTML =
          auditOutput;
          const ctx = document.getElementById("statusChart").getContext("2d");

new Chart(ctx,{
    type:"doughnut",

    data:{

        labels:[
            `Completed (${completedCRs})`,
            `In Progress (${inProgressCRs})`,
            `Rejected (${rejectedCRs})`
        ],

        datasets:[{

            data:[
                completedCRs,
                inProgressCRs,
                rejectedCRs
            ],

            backgroundColor:[
                "#28a745",
                "#0d6efd",
                "#dc3545"
            ],

            borderWidth:2

        }]
    },
options:{

    animation:{
        animateRotate:true,
        duration:1500
    },

    responsive:true,

    plugins:{

        legend:{
            position:"bottom"
        }

    }

}
});

    } loadCRData();
    function logout(){

    localStorage.clear();

    window.location.href = "login.html";

    }
    async function toggleDuplicatePanel(){
        const panel = document.getElementById("duplicatePanel");

if(panel.innerHTML !== ""){

    panel.innerHTML = "";

    document.getElementById("duplicateToggle").innerHTML =
    "▶ Duplicate Change Requests : " + duplicateCRs.length;

    return;

}
    const response = await fetch("http://localhost:3000");
    const data = await response.json();

    const duplicateCRs =
    data.crs.filter(cr => cr.duplicateDetected === "Yes");

    let html = `
    <div class="card" style="margin-top:25px;position:relative;">

    <h2>🤖 AI Duplicate Detection</h2>

        <p>
        The following Change Requests were identified as similar by the AI engine.
        </p>

        <hr>
    `;

    duplicateCRs.forEach(cr => {

        html += `

        <div style="
        padding:15px;
        margin-bottom:15px;
        border-left:5px solid #ffc107;
        background:#fff8e1;
        border-radius:8px;
        ">

            <h3>${cr.cr_id}</h3>

            <p><strong>Title:</strong> ${cr.title}</p>

            <p><strong>Similar CR:</strong> ${cr.similarCR}</p>

            <p><strong>Duplicate Probability:</strong> ${cr.duplicateProbability}%</p>

            <button
            onclick="window.location.href='crdetails.html?id=${cr.cr_id}'">
            View Details
            </button>

        </div>

        `;

    });

    html += "</div>";

    document.getElementById("duplicatePanel").innerHTML = html;

    document.getElementById("duplicateToggle").innerHTML =
    "▼ Duplicate Change Requests : " + duplicateCRs.length;

}

    </script>

</body>

</html>
