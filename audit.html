<!DOCTYPE html>
<html>

<head>

<title>Audit Dashboard</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:30px;
}

h1{
    color:#0a6ed1;
}

.audit-card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0px 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
    cursor:pointer;
}
.audit-card:hover{

    transform:translateY(-5px);

    box-shadow:0 10px 25px rgba(0,0,0,.18);

}
</style>

</head>

<body>
    <button
onclick="window.location.href='index.html'"
style="
background:#0a6ed1;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
">
🏠 Dashboard
</button>

<button
onclick="window.location.href='login.html'"
style="
background:#dc3545;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
">
🚪 Logout
</button>

<h1>SAP Audit Dashboard</h1>

<input
    type="text"
    id="searchAudit"
    placeholder="🔍 Search by CR ID, User, Role, Action..."
    onkeyup="loadAuditLogs()"
    style="
        width:350px;
        padding:10px;
        border-radius:8px;
        border:1px solid #ccc;
        margin-bottom:20px;
    "
>
<select
id="roleFilter"
onchange="loadAuditLogs()"
style="
width:180px;
padding:10px;
margin-left:10px;
border-radius:8px;
border:1px solid #ccc;
">

<option value="All">All Roles</option>

<option value="Requester">Requester</option>

<option value="AMS">AMS</option>

<option value="Manager">Manager</option>

<option value="CAB">CAB</option>

<option value="Testing">Testing</option>

<option value="Production">Production</option>

</select>
<select
id="actionFilter"
onchange="loadAuditLogs()"
style="
width:220px;
padding:10px;
margin-left:10px;
border-radius:8px;
border:1px solid #ccc;
">

<option value="All">All Actions</option>

<option value="CR Created">CR Created</option>

<option value="Analysis Completed">Analysis Completed</option>

<option value="CR Approved">CR Approved</option>

<option value="CAB Approved">CAB Approved</option>

<option value="Testing Passed">Testing Passed</option>

<option value="CR Deployed">CR Deployed</option>

</select>

<h3 id="totalRecords" style="color:#0a6ed1;margin-top:20px;"></h3>

<div id="auditContainer"></div>

<script>
    function formatDate(dateString){

    const date = new Date(dateString);

    return date.toLocaleString("en-IN",{
        day:"2-digit",
        month:"short",
        year:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:true
    });

}
    /*const role = localStorage.getItem("role");

    if(
        role !== "AMS" &&
        role !== "Manager" &&
        role !== "CAB"
    ){
        alert("Access Denied");
        window.location.href = "login.html";
    }*/


async function loadAuditLogs(){

    const response =
    await fetch("http://localhost:3000/audit-logs");

    const logs =
    await response.json();

    const container =
    document.getElementById("auditContainer");

    const searchText =
    document.getElementById("searchAudit").value.toLowerCase();

    const selectedRole =
    document.getElementById("roleFilter").value;

    const selectedAction =
    document.getElementById("actionFilter").value;

    container.innerHTML = "";

    const filteredLogs = logs.filter(log =>

    (

    log.cr_id.toLowerCase().includes(searchText) ||

    log.user_name.toLowerCase().includes(searchText) ||

    log.role.toLowerCase().includes(searchText) ||

    log.action_taken.toLowerCase().includes(searchText) ||

    log.remarks.toLowerCase().includes(searchText)

    )

    &&

    (

    selectedRole === "All" ||

    log.role === selectedRole

    )

    &&

    (

    selectedAction === "All" ||

    log.action_taken === selectedAction

    )

    );

    document.getElementById("totalRecords").innerHTML =
    `📋 Total Audit Records : ${filteredLogs.length}`;

    filteredLogs.forEach(log => {

        container.innerHTML += `

        <div class="audit-card">

            <h3>${log.cr_id}</h3>

            <p>👤 <strong>User:</strong> ${log.user_name}</p>

            <p>🛡️ <strong>Role:</strong> ${log.role}</p>

            <p>⚡ <strong>Action:</strong> ${log.action_taken}</p>

            <p>📝 <strong>Remarks:</strong> ${log.remarks}</p>

            <p>🕒 <strong>Time:</strong> ${formatDate(log.log_time)}</p>

        </div>

        `;

    });

}

loadAuditLogs();

</script>

</body>
</html>
