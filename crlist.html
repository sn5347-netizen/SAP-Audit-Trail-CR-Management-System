<!DOCTYPE html>
<html>

<head>

<title>All Change Requests</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    color:#0a6ed1;
}

.card{

    flex:1 1 31%;

    min-width:320px;

    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);

    transition:.3s;
}
.card:hover{

    transform:translateY(-6px);

    box-shadow:0px 10px 25px rgba(0,0,0,0.18);

}
.cards-container{

    display:flex;

    flex-wrap:wrap;

    gap:25px;

}
.ai-safe{

    display:inline-block;

    background:#e8f8ec;

    color:#198754;

    padding:8px 18px;

    border-radius:25px;

    font-weight:bold;

}
.ai-review{

    display:inline-block;

    background:#fff4d6;

    color:#b8860b;

    padding:8px 18px;

    border-radius:25px;

    font-weight:bold;

}
.ai-critical{

    display:inline-block;

    background:#ffe5e5;

    color:#dc3545;

    padding:8px 18px;

    border-radius:25px;

    font-weight:bold;

}
.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    font-size:13px;
}

.completed{
    background:#28a745;
}

.pending{
    background:#fd7e14;
}

.cab{
    background:#0d6efd;
}

.testing{
    background:#6f42c1;
}

.production{
    background:#20c997;
}

.analysis{
    background:#17a2b8;
}

.rejected{
    background:#dc3545;
}

.priority-critical{
    background:#dc3545;
}

.priority-high{
    background:#fd7e14;
}

.priority-medium{
    background:#ffc107;
    color:black;
}

.priority-low{
    background:#198754;
}

.risk-high{
    background:#dc3545;
}

.risk-medium{
    background:#fd7e14;
}

.risk-low{
    background:#198754;
}
</style>

</head>

<body>

    <button
    onclick="window.location.href='index.html'"
    style="
    background:#0a6ed1;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    margin-bottom:20px;
    cursor:pointer;
    ">
    🏠 Back to Dashboard
    </button>
    <button
    onclick="window.location.href='login.html'"
    style="
    background:#dc3545;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    margin-left:10px;
    cursor:pointer;
    ">
    🚪 Logout
    </button>

<h1>All Change Requests</h1>

<input
    type="text"
    id="searchCR"
    placeholder="Search CR ID or Title..."
    onkeyup="loadCRs()"
    style="
        width:300px;
        padding:10px;
        border-radius:8px;
        border:1px solid #ccc;
        margin-bottom:20px;
    "
>

<select
    id="statusFilter"
    onchange="loadCRs()"
    style="
        width:220px;
        padding:10px;
        margin-left:10px;
        border-radius:8px;
        border:1px solid #ccc;
    "
>

    <option value="All">All Status</option>

    <option value="Analysis Completed">
        Analysis Completed
    </option>

    <option value="Manager Approval Pending">
        Manager Approval Pending
    </option>

    <option value="Rejected By CAB">
        Rejected By CAB
    </option>

    <option value="Completed">
        Completed
    </option>

    <option value="Testing Pending">
        Testing Pending
    </option>

    <option value="CAB Approval Pending">
        CAB Approval Pending
    </option>

    <option value="Production Pending">
        Production Pending
    </option>

    <option value="Pending">
        Pending
    </option>

    <option value="Rejected">
        Rejected
    </option>

</select>

<div id="crList"></div>

<script>
    /*const role = localStorage.getItem("role");

    if(
        role !== "AMS" &&
        role !== "Manager" &&
        role !== "CAB"
    ){
        alert("Access Denied");
        window.location.href = "login.html";
    }*/

async function loadCRs(){

    const response =
    await fetch("http://localhost:3000");

    const data =
    await response.json();

    const searchText =
    document.getElementById("searchCR").value.toLowerCase();

    const selectedStatus =
    document.getElementById("statusFilter").value;

    const params =
    new URLSearchParams(window.location.search);

    const dashboardFilter =
    params.get("filter");

    let output = '<div class="cards-container">';

    let filteredCRs = data.crs;

if(dashboardFilter === "critical"){

    filteredCRs =
    filteredCRs.filter(
    cr => cr.priority === "Critical"
    );

}

if(dashboardFilter === "completed"){

    filteredCRs =
    filteredCRs.filter(
    cr => cr.status === "Completed"
    );

}

if(dashboardFilter === "inprogress"){

    filteredCRs =
    filteredCRs.filter(cr =>

        [
            "Pending",
            "Analysis Completed",
            "Manager Approval Pending",
            "CAB Approval Pending",
            "Testing Pending",
            "Production Pending"
        ].includes(cr.status)

    );

}
if(dashboardFilter === "highrisk"){

    filteredCRs =
    filteredCRs.filter(
    cr => cr.risk === "High"
    );

}
if(dashboardFilter === "rejected"){

    filteredCRs =
    filteredCRs.filter(cr =>

        cr.status === "Rejected" ||
        cr.status === "Rejected By CAB"

    );

}

    filteredCRs
    .filter(cr =>

    (
        cr.cr_id.toLowerCase().includes(searchText)
        ||
        cr.title.toLowerCase().includes(searchText)
    )

    &&

    (
        selectedStatus === "All"
        ||
        cr.status === selectedStatus
    )

    )
    .forEach(cr => {

        output += `
        <div
        class="card"
        onclick="window.location.href='crdetails.html?id=${cr.cr_id}'"
        style="cursor:pointer;">

            <h3>${cr.cr_id}</h3>

            <h2>${cr.title}</h2>

            <p><strong>Module:</strong> ${cr.module}</p>

            <p>
            <strong>Status:</strong>

            <span class="badge ${
                cr.status === "Completed" ? "completed" :
                cr.status === "Pending" ? "pending" :
                cr.status === "Analysis Completed" ? "analysis" :
                cr.status === "Manager Approval Pending" ? "pending" :
                cr.status === "CAB Approval Pending" ? "cab" :
                cr.status === "Testing Pending" ? "testing" :
                cr.status === "Production Pending" ? "production" :
                "rejected"
            }">
            ${cr.status}
            </span>

            </p>

            <p>

            <strong>Priority:</strong>

            <span class="badge priority-${cr.priority.toLowerCase()}">

            ${cr.priority}

            </span>

            </p>

           <p>

            <strong>Risk:</strong>

            <span class="badge risk-${cr.risk.toLowerCase()}">

            ${cr.risk}

            </span>

            </p>
            <p>

            <span class="${
                cr.aiRecommendation === "CAB Review Required"
                    ? "ai-critical"
                    : cr.aiRecommendation === "Needs Review"
                    ? "ai-review"
                    : "ai-safe"
            }">
            🤖 ${cr.aiRecommendation || "Safe for Processing"}
            </span>

            </p>

        </div>
        `;

    });
    output += "</div>";

    document.getElementById("crList").innerHTML =
    output;

}

loadCRs();

</script>

</body>

</html>
